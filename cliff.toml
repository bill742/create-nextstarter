# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first | trim }}\
{% endfor %}
{% endfor %}\n
"""
footer = """
{% for release in releases %}\
{% if release.version %}\
{% if release.previous.version %}\
[{{ release.version | trim_start_matches(pat="v") }}]: \
  https://github.com/bill742/create-nextstarter/compare/{{ release.previous.version }}...{{ release.version }}
{% else %}\
[{{ release.version | trim_start_matches(pat="v") }}]: \
  https://github.com/bill742/create-nextstarter/releases/tag/{{ release.version }}
{% endif %}\
{% else %}\
[unreleased]: https://github.com/bill742/create-nextstarter/compare/{{ release.previous.version }}...HEAD
{% endif %}\
{% endfor %}"""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
commit_parsers = [
  { message = "^[Aa]dd", group = "Added" },
  { message = "^[Ff]eat", group = "Added" },
  { message = "^[Ff]ix", group = "Fixed" },
  { message = "^[Bb]ug", group = "Fixed" },
  { message = "^[Rr]emov", group = "Removed" },
  { message = "^[Dd]eprecate", group = "Deprecated" },
  { message = "^[Ss]ecurity", group = "Security" },
  { message = "^[Cc]hang", group = "Changed" },
  { message = "^[Rr]efactor", group = "Changed" },
  { message = "^[Rr]ename", group = "Changed" },
  { message = "^[Uu]pdate", group = "Changed" },
  { message = "^[Pp]rompt", group = "Changed" },
  { message = ".*", group = "Changed" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
